<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Creator OS — The Crew Lounge</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0f1210; --sur: #161d18; --card: #1c2620; --bor: #2a3830;
  --a1: #e8836a; --a2: #c4614a; --a3: #7ab88a; --a4: #f0b87a;
  --a5: #a8d4b0; --tx: #f5f0ec; --mu: #7a9080; --dn: #e07060;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--sur)}::-webkit-scrollbar-thumb{background:var(--bor);border-radius:3px}
input,textarea,select,button{font-family:'DM Sans',sans-serif}
button{cursor:pointer}
a{color:var(--a1)}

/* SHELL */
.shell{display:flex;min-height:100vh}

/* SIDEBAR */
.sb{width:220px;min-height:100vh;background:var(--sur);border-right:1px solid var(--bor);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;overflow-y:auto}
.logo{padding:20px 16px 14px;border-bottom:1px solid var(--bor)}
.logo h1{font-family:'Cormorant Garamond',serif;font-size:21px;background:linear-gradient(135deg,var(--a1),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
.logo p{font-size:10px;color:var(--mu);margin-top:2px}
.logo .autosave{font-size:9px;color:var(--a3);margin-top:5px}
.snav{padding:8px 0;flex:1}
.ssec{padding:0 9px 5px}
.sslbl{font-size:9px;font-weight:600;color:var(--mu);letter-spacing:.12em;text-transform:uppercase;padding:6px 7px 2px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;font-size:12.5px;font-weight:500;color:var(--mu);transition:all .15s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;cursor:pointer}
.ni:hover{background:var(--card);color:var(--tx)}
.ni.active{background:linear-gradient(135deg,rgba(232,131,106,.13),rgba(122,184,138,.07));color:var(--tx);border:1px solid rgba(232,131,106,.25)}
.sb-footer{padding:10px;border-top:1px solid var(--bor);font-size:9px;color:var(--mu);text-align:center}

/* MAIN */
.main{margin-left:220px;flex:1;padding:24px 28px;max-width:1100px}

/* PAGES */
.page{display:none}.page.active{display:block}
.ph h2{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;margin-bottom:3px}
.ph p{font-size:12px;color:var(--mu);margin-bottom:20px}
.glow{background:linear-gradient(135deg,var(--a1),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* CARDS */
.card{background:var(--card);border:1px solid var(--bor);border-radius:10px;padding:16px;margin-bottom:16px}
.card-title{font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:16px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--bor);border-radius:12px;padding:16px;transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-val{font-size:24px;font-weight:700;font-family:'Cormorant Garamond',serif;margin:6px 0 2px}
.stat-lbl{font-size:11px;color:var(--mu)}

/* PROGRESS */
.pb{height:5px;background:var(--bor);border-radius:99px;overflow:hidden;margin:5px 0 3px}
.pf{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--a1),var(--a3));transition:width .5s}

/* TAGS & BADGES */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600}
.badge{padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 12px;font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bor);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid rgba(42,56,48,.1);vertical-align:middle}
tr:hover td{background:rgba(22,29,24,.3)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;font-size:12px;font-weight:600;border:none;transition:all .15s;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-ghost{background:rgba(42,56,48,.27);color:var(--tx);border:1px solid var(--bor)}
.btn-ghost:hover{background:var(--bor)}
.btn-sm{padding:4px 9px;font-size:11px;border-radius:5px}
.btn-danger{background:rgba(224,112,96,.11);color:var(--dn);border:1px solid rgba(224,112,96,.17)}
.btn-danger:hover{background:rgba(224,112,96,.2)}

/* FORMS */
.inp{background:var(--sur);border:1px solid var(--bor);border-radius:7px;padding:7px 10px;color:var(--tx);font-size:12px;width:100%;outline:none;transition:border-color .15s}
.inp:focus{border-color:rgba(232,131,106,.5)}
.inp::placeholder{color:var(--mu)}
textarea.inp{resize:vertical;min-height:70px;line-height:1.6}
select.inp{cursor:pointer}
.fg{margin-bottom:12px}
.fg label{font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;display:block}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.divx{height:1px;background:var(--bor);margin:14px 0}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(3px);z-index:1000;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--bor);border-radius:13px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:24px}
.modal.wide{max-width:700px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-header h3{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:700}

/* TABS */
.tabs{display:flex;gap:3px;background:var(--sur);padding:3px;border-radius:8px;border:1px solid var(--bor);flex-wrap:wrap;margin-bottom:16px;width:fit-content}
.tab{padding:5px 12px;border-radius:5px;font-size:11px;font-weight:500;color:var(--mu);cursor:pointer;border:none;background:none;transition:all .15s}
.tab.active{background:var(--card);color:var(--tx);box-shadow:0 1px 5px rgba(0,0,0,.2)}

/* NOTES */
.note-list{display:flex;flex-direction:column;gap:6px}
.note-card{background:var(--card);border:1px solid var(--bor);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s}
.note-card:hover{transform:translateY(-2px)}
.note-title{font-size:13px;font-weight:600;margin-bottom:4px}
.note-preview{font-size:11px;color:var(--mu);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* BRAND FIELDS */
.bf{background:var(--sur);border:1px solid var(--bor);border-radius:7px;padding:10px 12px;margin-bottom:8px}
.bfl{font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}

/* CHAT */
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 220px);min-height:400px}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;background:var(--sur);border-radius:10px;margin-bottom:12px;border:1px solid var(--bor)}
.chat-msg{max-width:85%;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.chat-msg.user{background:rgba(232,131,106,.13);border:1px solid rgba(232,131,106,.2);align-self:flex-end}
.chat-msg.ai{background:var(--card);border:1px solid var(--bor);align-self:flex-start}
.ai-label{font-size:9px;font-weight:700;color:var(--a3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.chat-input-row{display:flex;gap:8px;align-items:flex-end}
.chat-inp{background:var(--sur);border:1px solid var(--bor);border-radius:8px;padding:10px 12px;color:var(--tx);font-size:13px;flex:1;resize:none;outline:none;min-height:44px;font-family:'DM Sans',sans-serif;line-height:1.5}
.chat-inp:focus{border-color:rgba(232,131,106,.5)}
.quick-btns{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.qb{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid rgba(232,131,106,.3);background:rgba(232,131,106,.07);color:var(--a1);cursor:pointer;transition:all .15s}
.qb:hover{background:rgba(232,131,106,.15)}

/* EMPTY */
.empty{text-align:center;padding:36px;color:var(--mu)}
.empty-icon{font-size:40px;margin-bottom:10px}

/* CAL */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{min-height:72px;background:var(--sur);border:1px solid var(--bor);border-radius:7px;padding:5px;font-size:10px}
.cal-cell.today{border-color:var(--a1)}
.cal-day-num{font-size:10px;font-weight:700;color:var(--mu);margin-bottom:2px}
.cal-post{font-size:9px;padding:1px 4px;border-radius:3px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

@media(max-width:820px){.g2{grid-template-columns:1fr}.main{padding:14px}.sb{width:185px}.main{margin-left:185px}}
</style>
</head>
<body>

<div class="shell">
  <!-- SIDEBAR -->
  <div class="sb">
    <div class="logo">
      <h1>Creator OS</h1>
      <p>✈ The Crew Lounge</p>
      <div class="autosave">💾 Auto-saves to your device</div>
    </div>
    <nav class="snav" id="sidebar-nav"></nav>
    <div class="sb-footer">Creator OS v2.0</div>
  </div>

  <!-- MAIN -->
  <main class="main" id="main-content"></main>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ─── STORAGE ──────────────────────────────────────────────────────────────────
function load(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

// ─── DATA ────────────────────────────────────────────────────────────────────
const PILLARS_DEF = [
  {id:1,name:"Storytelling",color:"#e8836a",emoji:"🎭",description:"Cinematic fiction, drama, cliffhangers"},
  {id:2,name:"Education",color:"#7ab88a",emoji:"💡",description:"Tips, facts, insider knowledge"},
  {id:3,name:"Behind Scenes",color:"#a8d4b0",emoji:"🎬",description:"Day in the life, process"},
  {id:4,name:"Monetization",color:"#f0b87a",emoji:"💰",description:"CTAs, product plugs"},
  {id:5,name:"Community",color:"#c4614a",emoji:"🤝",description:"Q&A, engagement, trends"},
];
const POSTS_DEF = [
  {id:1,title:"The Passenger in 14C",pillar:1,platform:"TikTok",status:"Published",hook:"She handed me a folded note right before we landed...",caption:"Some passengers leave tips. She left something else.",hashtags:"#flightattendant #storytime #fyp",cta:"Follow for Part 2",date:"2025-04-01",views:"142K",likes:"18.2K",comments:"934",shares:"4.1K",monetize:"",revenue:"",notes:""},
  {id:2,title:"Why I Left My 9-5 for 36K ft",pillar:3,platform:"TikTok",status:"Scheduled",hook:"I was making 6 figures. Then I quit.",caption:"The real reason FAs don't quit",hashtags:"#flightattendant",cta:"Save this",date:"2025-04-05",views:"",likes:"",comments:"",shares:"",monetize:"Digital Product",revenue:"",notes:""},
];
const GOALS_DEF = [
  {id:1,label:"TikTok Followers",current:4800,target:10000,unit:"followers",emoji:"🎯",deadline:"2025-05-31"},
  {id:2,label:"Monthly Revenue",current:2161,target:5000,unit:"$",emoji:"💸",deadline:"2025-05-31"},
  {id:3,label:"Posts Published",current:12,target:30,unit:"posts",emoji:"📱",deadline:"2025-04-30"},
  {id:4,label:"Email List",current:210,target:1000,unit:"subscribers",emoji:"📧",deadline:"2025-06-30"},
];
const PRODS_DEF = [
  {id:1,name:"Crew Lounge Script Bundle",type:"Digital Product",price:27,platform:"Gumroad",status:"Live",sales:43,revenue:1161,description:"10 viral FA fiction scripts"},
  {id:2,name:"Faceless Content Course",type:"Course",price:197,platform:"Teachable",status:"In Progress",sales:0,revenue:0,description:"Build a 6-figure faceless brand"},
];
const NOTES_DEF = [
  {id:1,title:"Brand Voice Bible",tags:["branding"],color:"#e8836a",pinned:true,content:"The Crew Lounge speaks like a seasoned FA — witty, warm, mysterious. Never desperate. Always in control.\n\nTone: Conversational but cinematic\nAvoid: Clichés, filler phrases",date:"2025-04-01"},
  {id:2,title:"Script Ideas Dump",tags:["scripts"],color:"#7ab88a",pinned:true,content:"- Passenger who recognized me from viral video\n- Medical emergency over the Pacific\n- Why I never eat airplane food\n- Unwritten rules of first class",date:"2025-04-02"},
  {id:3,title:"Affiliate Programs",tags:["monetize"],color:"#f0b87a",pinned:false,content:"☐ Amazon Associates\n☐ Skyscanner\n☐ Away Luggage\n☐ Audible\n☐ NordVPN",date:"2025-04-03"},
];
const AFF_DEF = [
  {id:1,name:"Amazon Associates",niche:"Travel Gear",comm:"4-8%",status:"Active",clicks:284,conv:12,rev:140,notes:"Great for luggage"},
  {id:2,name:"Away Luggage",niche:"Luggage",comm:"10%",status:"Pending",clicks:0,conv:0,rev:0,notes:"Applied — waiting"},
  {id:3,name:"Skyscanner",niche:"Travel Booking",comm:"$0.80/click",status:"Active",clicks:1200,conv:88,rev:320,notes:"High converter"},
];
const DEALS_DEF = [{id:1,brand:"TravelPro Luggage",type:"Gifted + Commission",value:400,status:"Active",deliverables:"2 TikToks + 1 Reel",deadline:"2025-05-15",contact:"partnerships@travelpro.com",notes:"Code: CREW10"}];
const REV_DEF = [
  {id:1,date:"2025-04-01",source:"Script Bundle",type:"Digital Product",amount:729,notes:"27 sales"},
  {id:2,date:"2025-04-03",source:"Skyscanner",type:"Affiliate Link",amount:120,notes:""},
  {id:3,date:"2025-04-05",source:"Media Kit",type:"Services",amount:500,notes:"TravelPro"},
];
const BRAND_DEF = {
  name:"The Crew Lounge",handle:"@seat1a",tagline:"36,000 feet of unfiltered truth.",
  mission:"To entertain, educate, and inspire through cinematic faceless storytelling.",
  voice:"Witty, warm, mysterious, cinematic. Never desperate. Always in control.",
  audience:"Women 22-38. Travel enthusiasts, aspiring FAs, drama lovers.",
  colors:"#e8836a salmon, #7ab88a sage green",avoid:"Clichés, filler words, face reveals",
  hooks:"She told me something I wasn't supposed to hear.",
  ctas:"Follow for Part 2 / Save this / Link in bio",
  hashtags:"#flightattendant #cabincrew #storytime #facelesscreator #fyp",
  posting:"TikTok: 5-7x/week · Reels: 3-4x/week",
  usp:"The only faceless FA account blurring fiction and real experience."
};
const PERS_DEF = [
  {id:1,name:"Aspiring Aviator",age:"22-28",gender:"Female",location:"USA, UK, Australia",pain:"Wants to become a FA but doesn't know how",desires:"Insider knowledge, inspiration",content:"Application tips, training stories",buys:"Script bundles, career guides"},
  {id:2,name:"Travel Drama Fan",age:"25-38",gender:"Female",location:"USA, Canada, Europe",pain:"Craves good stories",desires:"Cinematic storytelling",content:"Fiction, cliffhangers",buys:"Shares and grows audience"},
];
const SCRIPTS_DEF = [
  {id:1,title:"The Passenger in 14C",pillar:"Storytelling",tags:"drama,mystery",hook:"She handed me a folded note right before we landed...",body:"[AMBIENT FLIGHT SOUNDS]\n\nVO: We were 20 minutes from landing.\n\nShe was in 14C. Hadn't touched her meal.\n\nShe pressed a folded napkin into my hand.\n\nThree words.\n\n*Don't land yet.*\n\nVO: Part 2 tomorrow.",cta:"Follow for Part 2 👇",notes:"Slow burn. End on cliffhanger."},
  {id:2,title:"Why I Never Eat Airplane Food",pillar:"Education",tags:"tips",hook:"8 years flying. Never once eaten the crew meal.",body:"VO: At 35,000 feet your sense of taste drops 30%.\n\nHumidity is lower than the Sahara.\n\nCrew meals? We know exactly when they were made.",cta:"Save this.",notes:""},
];

// State
let STATE = {
  page: 'dashboard',
  posts: load('cos_posts', POSTS_DEF),
  goals: load('cos_goals', GOALS_DEF),
  prods: load('cos_prods', PRODS_DEF),
  pillars: load('cos_pillars', PILLARS_DEF),
  notes: load('cos_notes', NOTES_DEF),
  affiliates: load('cos_aff', AFF_DEF),
  deals: load('cos_deals', DEALS_DEF),
  revenue: load('cos_rev', REV_DEF),
  brand: load('cos_brand', BRAND_DEF),
  personas: load('cos_pers', PERS_DEF),
  scripts: load('cos_scripts', SCRIPTS_DEF),
  chat: load('cos_chat', [{role:'ai',content:'Hey Marisol! 👋 I\'m your AI Content Agent — built for The Crew Lounge.\n\nI can write scripts, hooks, captions, content plans, pitch emails — all in your brand voice.\n\nWhat do you need today?'}]),
  activeNote: null,
  editingBrand: false,
};

function saveState(key) {
  const map = {posts:'cos_posts',goals:'cos_goals',prods:'cos_prods',pillars:'cos_pillars',notes:'cos_notes',affiliates:'cos_aff',deals:'cos_deals',revenue:'cos_rev',brand:'cos_brand',personas:'cos_pers',scripts:'cos_scripts',chat:'cos_chat'};
  if(map[key]) save(map[key], STATE[key]);
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function uid(){return Date.now()+Math.random().toString(36).slice(2);}
function pct(c,t){return Math.min(100,Math.round((c/t)*100));}
function fmt(n){if(!n&&n!==0)return'—';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return String(n);}
function fd(n){if(!n&&n!==0)return'—';return'$'+Number(n).toLocaleString();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function statusColor(s){return {Idea:'#7a9080',Scripting:'#e8836a',Filming:'#c4614a',Editing:'#f0b87a',Scheduled:'#7ab88a',Published:'#a8d4b0',Repurposed:'#d4c4a8'}[s]||'#888';}

// ─── NAV ─────────────────────────────────────────────────────────────────────
const NAV = [
  {s:'Overview',items:[{id:'dashboard',ic:'✦',l:'Dashboard'},{id:'goals',ic:'🎯',l:'Goals'}]},
  {s:'Content',items:[{id:'planner',ic:'📝',l:'Content Planner'},{id:'calendar',ic:'📅',l:'Calendar'},{id:'pillars',ic:'🏛',l:'Pillars'},{id:'scripts',ic:'🎬',l:'Scripts'}]},
  {s:'Monetize',items:[{id:'products',ic:'💰',l:'Products'},{id:'affiliates',ic:'🔗',l:'Affiliates'},{id:'deals',ic:'🤝',l:'Brand Deals'},{id:'revenue',ic:'📈',l:'Revenue'}]},
  {s:'Brand',items:[{id:'brand',ic:'✨',l:'Brand Hub'},{id:'personas',ic:'👥',l:'Personas'}]},
  {s:'Tools',items:[{id:'agent',ic:'🤖',l:'AI Agent'},{id:'notes',ic:'📓',l:'Smart Notes'}]},
];

function renderNav() {
  const el = document.getElementById('sidebar-nav');
  el.innerHTML = NAV.map(sec => `
    <div class="ssec">
      <div class="sslbl">${sec.s}</div>
      ${sec.items.map(i => `
        <button class="ni${STATE.page===i.id?' active':''}" onclick="goTo('${i.id}')">
          <span style="font-size:14px">${i.ic}</span>${i.l}
        </button>
      `).join('')}
    </div>
  `).join('');
}

function goTo(page) {
  STATE.page = page;
  renderNav();
  renderPage();
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(title, html, wide) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-box').className = 'modal' + (wide?' wide':'');
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}
document.getElementById('modal-bg').addEventListener('click', function(e){
  if(e.target===this) closeModal();
});

// ─── RENDER PAGE ─────────────────────────────────────────────────────────────
function renderPage() {
  const el = document.getElementById('main-content');
  const pages = {
    dashboard: renderDashboard,
    goals: renderGoals,
    planner: renderPlanner,
    calendar: renderCalendar,
    pillars: renderPillars,
    scripts: renderScripts,
    products: renderProducts,
    affiliates: renderAffiliates,
    deals: renderDeals,
    revenue: renderRevenue,
    brand: renderBrand,
    personas: renderPersonas,
    agent: renderAgent,
    notes: renderNotes,
  };
  el.innerHTML = (pages[STATE.page] || (() => '<div class="empty"><div class="empty-icon">🚧</div><p>Coming soon!</p></div>'))();
  if(STATE.page==='agent') initAgent();
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function renderDashboard() {
  const rev = STATE.prods.reduce((s,p)=>s+(Number(p.revenue)||0),0);

// ─── CALENDAR ─────────────────────────────────────────────────────────────────
function renderCalendar() {
  const now = new Date();
  const mo = STATE.calMo !== undefined ? STATE.calMo : now.getMonth();
  const yr = STATE.calYr || now.getFullYear();
  const MNS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DNS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const fd = new Date(yr,mo,1).getDay();
  const dim = new Date(yr,mo+1,0).getDate();
  const cells = Array(fd).fill(null).concat(Array.from({length:dim},(_,i)=>i+1));
  while(cells.length%7!==0) cells.push(null);
  return `
    <div class="ph"><h2>Content Calendar</h2><p>Your posting schedule at a glance.</p></div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <button class="btn btn-ghost btn-sm" onclick="calNav(-1)">← Prev</button>
      <span style="font-size:18px;font-weight:700;font-family:'Cormorant Garamond',serif">${MNS[mo]} ${yr}</span>
      <button class="btn btn-ghost btn-sm" onclick="calNav(1)">Next →</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">
      ${DNS.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--mu);padding:4px">${d}</div>`).join('')}
    </div>
    <div class="cal-grid">
      ${cells.map(d=>{
        if(!d) return '<div class="cal-cell" style="background:transparent;border-color:transparent"></div>';
        const ds = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const posts = STATE.posts.filter(p=>p.date===ds);
        const isT = d===now.getDate()&&mo===now.getMonth()&&yr===now.getFullYear();
        return `<div class="cal-cell${isT?' today':''}">
          <div class="cal-day-num" style="color:${isT?'var(--a1)':'var(--mu)'}">${d}</div>
          ${posts.map(p=>{
            const pl=STATE.pillars.find(x=>x.id===p.pillar||x.id===Number(p.pillar));
            return `<div class="cal-post" style="background:${(pl?.color||'#e8836a')}20;color:${pl?.color||'#e8836a'}">${pl?.emoji||''} ${esc(p.title)}</div>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>
  `;
}
function calNav(dir){
  const now=new Date();
  let mo=STATE.calMo!==undefined?STATE.calMo:now.getMonth();
  let yr=STATE.calYr||now.getFullYear();
  mo+=dir;
  if(mo<0){mo=11;yr--;}
  if(mo>11){mo=0;yr++;}
  STATE.calMo=mo;STATE.calYr=yr;renderPage();
}

function initAgent(){
  const msgs=document.getElementById('chat-msgs');
  if(msgs)msgs.scrollTop=msgs.scrollHeight;
}
async function sendChat(text){
  const inp=document.getElementById('chat-input');
  const msg=text||(inp?inp.value.trim():'');
  if(!msg)return;
  if(inp)inp.value='';
  STATE.chat.push({role:'user',content:msg});
  saveState('chat');
  const msgs=document.getElementById('chat-msgs');
  if(msgs){
    msgs.innerHTML+=`<div class="chat-msg user">${esc(msg)}</div>`;
    msgs.innerHTML+=`<div class="chat-msg ai" id="loading-msg"><div class="ai-label">🤖 AI Agent</div>Generating your content...</div>`;
    msgs.scrollTop=msgs.scrollHeight;
  }
  const btn=document.getElementById('chat-send-btn');
  if(btn)btn.disabled=true;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYS,messages:STATE.chat.filter(m=>m.role==='user').map(m=>({role:'user',content:m.content}))})});
    const data=await res.json();
    const reply=data.content?.map(b=>b.text||'').join('')||'Sorry, something went wrong. Try again!';
    STATE.chat.push({role:'ai',content:reply});
    saveState('chat');
    const loading=document.getElementById('loading-msg');
    if(loading)loading.outerHTML=`<div class="chat-msg ai"><div class="ai-label">🤖 AI Agent</div>${esc(reply)}</div>`;
  }catch(e){
    const loading=document.getElementById('loading-msg');
    if(loading)loading.outerHTML=`<div class="chat-msg ai"><div class="ai-label">🤖 AI Agent</div>Connection error. Check your internet and try again.</div>`;
  }
  if(btn)btn.disabled=false;
  const msgsEl=document.getElementById('chat-msgs');
  if(msgsEl)msgsEl.scrollTop=msgsEl.scrollHeight;
}

// ─── NOTES ────────────────────────────────────────────────────────────────────
function renderNotes(){
  const sorted=[...STATE.notes].sort((a,b)=>b.pinned-a.pinned);
  const active=STATE.activeNote?STATE.notes.find(n=>n.id==STATE.activeNote):null;
  return `
    <div class="ph"><h2>Smart Notes</h2><p>Your second brain — brain dumps, ideas, research. Auto-saved.</p></div>
    <div style="display:grid;grid-template-columns:255px 1fr;gap:16px;min-height:65vh">
      <div>
        <div style="display:flex;gap:6px;margin-bottom:10px">
          <input class="inp" id="note-search" placeholder="🔍 Search..." style="flex:1" oninput="filterNotes(this.value)"/>
          <button class="btn btn-primary btn-sm" onclick="newNote()">+</button>
        </div>
        <div class="note-list" id="note-list">
          ${sorted.map(n=>`
            <div class="note-card${STATE.activeNote==n.id?' active':''}" style="border-left:3px solid ${n.color};${STATE.activeNote==n.id?'background:var(--sur)':''}" onclick="selectNote('${n.id}')">
              <div style="display:flex;justify-content:space-between;align-items:flex-start">
                <div class="note-title" style="color:${STATE.activeNote==n.id?n.color:'inherit'}">${esc(n.title)}</div>
                <div style="display:flex;gap:3px;flex-shrink:0">
                  <button style="background:none;border:none;font-size:12px;color:${n.pinned?'var(--a4)':'var(--mu)'};cursor:pointer" onclick="event.stopPropagation();pinNote('${n.id}')">📌</button>
                  <button style="background:none;border:none;font-size:11px;color:var(--dn);cursor:pointer" onclick="event.stopPropagation();deleteNote('${n.id}')">✕</button>
                </div>
              </div>
              <div class="note-preview">${esc(n.content)}</div>
              <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">${(n.tags||[]).map(t=>`<span class="tag" style="background:${n.color}20;color:${n.color};font-size:9px">${esc(t)}</span>`).join('')}</div>
              <div style="font-size:9px;color:var(--mu);margin-top:4px">${n.date}</div>
            </div>
          `).join('')}
        </div>
      </div>
      ${active?`
        <div class="card" style="border-color:${active.color}38;display:flex;flex-direction:column">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:11px">
            <input style="flex:1;background:none;border:none;outline:none;font-size:20px;font-weight:700;font-family:'Cormorant Garamond',serif;color:${active.color}" value="${esc(active.title)}" id="note-title-inp" onchange="updateNote('title',this.value)" onblur="updateNote('title',this.value)"/>
            <input type="color" value="${active.color}" onchange="updateNote('color',this.value)" style="width:28px;height:28px;border:none;border-radius:5px;cursor:pointer;padding:2px;background:none"/>
          </div>
          <textarea class="inp" id="note-content-inp" style="flex:1;min-height:340px;border-color:${active.color}38;resize:vertical" onblur="updateNote('content',this.value)" placeholder="Brain dump everything here...">${esc(active.content)}</textarea>
          <div style="display:flex;gap:8px;margin-top:11px">
            <button class="btn btn-primary btn-sm" onclick="updateNote('content',document.getElementById('note-content-inp').value);updateNote('title',document.getElementById('note-title-inp').value)">💾 Save</button>
            <button class="btn btn-ghost btn-sm" onclick="pinNote('${active.id}')">${active.pinned?'Unpin':'📌 Pin'}</button>
            <button class="btn btn-danger btn-sm" onclick="deleteNote('${active.id}')">Delete</button>
          </div>
        </div>
      `:`
        <div class="card" style="display:flex;align-items:center;justify-content:center;min-height:260px">
          <div class="empty">
            <div class="empty-icon">📓</div>
            <p style="font-size:12px">Select a note or create a new one.</p>
            <button class="btn btn-primary" style="margin-top:12px" onclick="newNote()">+ New Note</button>
          </div>
        </div>
      `}
    </div>
  `;
}
function newNote(){
  const n={id:uid(),title:'Untitled',tags:[],color:'#e8836a',pinned:false,content:'',date:new Date().toISOString().slice(0,10)};
  STATE.notes.unshift(n);STATE.activeNote=n.id;saveState('notes');renderPage();
}
function selectNote(id){STATE.activeNote=id;renderPage();}
function updateNote(field,val){
  STATE.notes=STATE.notes.map(n=>n.id==STATE.activeNote?{...n,[field]:val}:n);
  saveState('notes');
}
function pinNote(id){STATE.notes=STATE.notes.map(n=>n.id==id?{...n,pinned:!n.pinned}:n);saveState('notes');renderPage();}
function deleteNote(id){STATE.notes=STATE.notes.filter(n=>n.id!=id);if(STATE.activeNote==id)STATE.activeNote=null;saveState('notes');renderPage();}
function filterNotes(q){
  const list=document.getElementById('note-list');if(!list)return;
  const all=list.querySelectorAll('.note-card');
  all.forEach(card=>{const text=card.textContent.toLowerCase();card.style.display=text.includes(q.toLowerCase())?'':'none';});
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderNav();
renderPage();
</script>
</body>
</html>
