<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Creator OS — Your Content Empire</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0f1210;--sur:#161d18;--card:#1c2620;--bor:#2a3830;--a1:#e8836a;--a2:#c4614a;--a3:#7ab88a;--a4:#f0b87a;--a5:#a8d4b0;--tx:#f5f0ec;--mu:#7a9080;--dn:#e07060}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--sur)}::-webkit-scrollbar-thumb{background:var(--bor);border-radius:3px}
input,textarea,select,button{font-family:'DM Sans',sans-serif}button{cursor:pointer}

.shell{display:flex;min-height:100vh}

/* SIDEBAR — height:100vh fixes iPad landscape Safari scroll bug */
.sb{width:225px;height:100vh;background:var(--sur);border-right:1px solid var(--bor);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;touch-action:pan-y}
.logo{padding:16px;border-bottom:1px solid var(--bor)}
.logo h1{font-family:'Cormorant Garamond',serif;font-size:20px;background:linear-gradient(135deg,var(--a1),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
.logo p{font-size:10px;color:var(--mu);margin-top:2px}
.autosave{font-size:9px;color:var(--a3);margin-top:4px}

/* ACCOUNT SWITCHER */
.acc-switch{padding:10px 12px;border-bottom:1px solid var(--bor)}
.acc-label{font-size:9px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.acc-current{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--a1)44;border-radius:8px;padding:8px 10px;cursor:pointer;transition:all .15s}
.acc-current:hover{border-color:var(--a1)88}
.acc-emoji{font-size:18px}
.acc-name{font-size:12px;font-weight:600;flex:1}
.acc-arrow{font-size:10px;color:var(--mu)}
.acc-dropdown{display:none;background:var(--card);border:1px solid var(--bor);border-radius:8px;margin-top:4px;overflow:hidden}
.acc-dropdown.open{display:block}
.acc-option{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;font-size:12px;transition:all .15s;border:none;background:none;width:100%;text-align:left;color:var(--tx)}
.acc-option:hover{background:var(--sur)}
.acc-option.active{color:var(--a1)}
.acc-add{color:var(--a3);font-weight:600}

.snav{padding:8px 0;flex:1}
.ssec{padding:0 9px 5px}
.sslbl{font-size:9px;font-weight:600;color:var(--mu);letter-spacing:.12em;text-transform:uppercase;padding:6px 7px 2px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;font-size:12px;font-weight:500;color:var(--mu);transition:all .15s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;cursor:pointer}
.ni:hover{background:var(--card);color:var(--tx)}
.ni.active{background:linear-gradient(135deg,rgba(232,131,106,.13),rgba(122,184,138,.07));color:var(--tx);border:1px solid rgba(232,131,106,.25)}
.sb-footer{padding:10px;border-top:1px solid var(--bor);font-size:9px;color:var(--mu);text-align:center}

/* POMODORO */
.pomo{padding:10px 12px;border-bottom:1px solid var(--bor);background:linear-gradient(135deg,rgba(232,131,106,.05),rgba(122,184,138,.03))}
.pomo-hdr{font-size:9px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.pomo-bar{height:3px;background:var(--bor);border-radius:99px;overflow:hidden;margin-bottom:6px}
.pomo-fill{height:100%;background:linear-gradient(90deg,var(--a1),var(--a3));transition:width 1s linear}
.pomo-time{font-size:30px;font-weight:700;font-family:'Cormorant Garamond',serif;color:var(--a1);text-align:center;line-height:1}
.pomo-phase{font-size:9px;color:var(--mu);text-align:center;margin-top:2px;margin-bottom:2px}
.pomo-rounds-txt{font-size:9px;color:var(--a3);text-align:center;margin-bottom:7px}
.pomo-btns{display:flex;gap:3px;margin-bottom:6px}
.pomo-btn{flex:1;padding:5px 3px;border-radius:5px;font-size:10px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
.pomo-go{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff}
.pomo-sec{background:var(--bor);color:var(--tx)}
.pomo-cust{font-size:9px;color:var(--mu);cursor:pointer;text-align:center;padding:2px}
.pomo-cust:hover{color:var(--tx)}
.pomo-settings{display:none;margin-top:6px}
.pomo-settings.open{display:block}
.pomo-row{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:4px}
.pomo-lbl{font-size:8px;color:var(--mu);display:block;margin-bottom:1px}
.pomo-inp{background:var(--bg);border:1px solid var(--bor);border-radius:4px;padding:3px 6px;color:var(--tx);font-size:11px;width:100%;outline:none}

/* CHECKBOXES */
.cbox{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--bor);cursor:pointer;flex-shrink:0;background:none;appearance:none;-webkit-appearance:none;transition:all .15s;vertical-align:middle}
.cbox:checked{background:var(--a3);border-color:var(--a3)}
.cbox-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(42,56,48,.07)}
.cbox-row:last-child{border-bottom:none}
.cbox-label{font-size:11px;flex:1}
.cbox-label.done{text-decoration:line-through;color:var(--mu)}

.main{margin-left:225px;flex:1;padding:22px 26px;max-width:1120px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ph h2{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;margin-bottom:3px}
.ph p{font-size:12px;color:var(--mu);margin-bottom:18px}
.glow{background:linear-gradient(135deg,var(--a1),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.card{background:var(--card);border:1px solid var(--bor);border-radius:10px;padding:14px;margin-bottom:14px}
.card-title{font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-bottom:14px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.sc{background:var(--card);border:1px solid var(--bor);border-radius:10px;padding:14px;transition:transform .2s}
.sc:hover{transform:translateY(-2px)}
.stat-val{font-size:22px;font-weight:700;font-family:'Cormorant Garamond',serif;margin:5px 0 2px}
.stat-lbl{font-size:10px;color:var(--mu)}
.pb{height:5px;background:var(--bor);border-radius:99px;overflow:hidden;margin:4px 0}
.pf{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--a1),var(--a3));transition:width .5s}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600}
.badge{padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:7px 10px;font-size:9px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bor);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid rgba(42,56,48,.08);vertical-align:middle}
tr:hover td{background:rgba(22,29,24,.3)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;font-size:12px;font-weight:600;border:none;transition:all .15s;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-ghost{background:rgba(42,56,48,.27);color:var(--tx);border:1px solid var(--bor)}
.btn-ghost:hover{background:var(--bor)}
.btn-sm{padding:4px 9px;font-size:11px;border-radius:5px}
.btn-danger{background:rgba(224,112,96,.11);color:var(--dn);border:1px solid rgba(224,112,96,.17)}
.inp{background:var(--sur);border:1px solid var(--bor);border-radius:7px;padding:7px 10px;color:var(--tx);font-size:12px;width:100%;outline:none;transition:border-color .15s}
.inp:focus{border-color:rgba(232,131,106,.5)}
.inp::placeholder{color:var(--mu)}
textarea.inp{resize:vertical;min-height:65px;line-height:1.6}
select.inp{cursor:pointer}
.fg{margin-bottom:10px}
.fg label{font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;display:block}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.divx{height:1px;background:var(--bor);margin:12px 0}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(3px);z-index:1000;align-items:center;justify-content:center;padding:16px}
.ov.open{display:flex}
.md{background:var(--card);border:1px solid var(--bor);border-radius:13px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;padding:22px}
.md.wide{max-width:700px}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mh h3{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700}
.tabs{display:flex;gap:3px;background:var(--sur);padding:3px;border-radius:8px;border:1px solid var(--bor);flex-wrap:wrap;margin-bottom:14px;width:fit-content}
.tab{padding:5px 11px;border-radius:5px;font-size:11px;font-weight:500;color:var(--mu);cursor:pointer;border:none;background:none;transition:all .15s}
.tab.active{background:var(--card);color:var(--tx);box-shadow:0 1px 5px rgba(0,0,0,.2)}
.nc{background:var(--card);border:1px solid var(--bor);border-radius:10px;padding:12px;cursor:pointer;transition:all .2s}
.nc:hover{transform:translateY(-2px)}
.bf{background:var(--sur);border:1px solid var(--bor);border-radius:7px;padding:9px 12px;margin-bottom:7px}
.bfl{font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.empty{text-align:center;padding:32px;color:var(--mu)}
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 220px);min-height:380px}
.chat-msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;background:var(--sur);border-radius:10px;margin-bottom:10px;border:1px solid var(--bor)}
.chat-msg{max-width:85%;padding:9px 13px;border-radius:10px;font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.chat-msg.user{background:rgba(232,131,106,.13);border:1px solid rgba(232,131,106,.2);align-self:flex-end}
.chat-msg.ai{background:var(--card);border:1px solid var(--bor);align-self:flex-start}
.ai-label{font-size:9px;font-weight:700;color:var(--a3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.chat-inp{background:var(--sur);border:1px solid var(--bor);border-radius:8px;padding:9px 11px;color:var(--tx);font-size:12px;flex:1;resize:none;outline:none;min-height:42px;font-family:'DM Sans',sans-serif;line-height:1.5}
.qb{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:500;border:1px solid rgba(232,131,106,.3);background:rgba(232,131,106,.07);color:var(--a1);cursor:pointer;margin:2px;transition:all .15s}
.qb:hover{background:rgba(232,131,106,.15)}

/* BRAND IDENTITY */
.brand-kit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.color-swatch{width:40px;height:40px;border-radius:8px;border:1px solid var(--bor);cursor:pointer}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.pillar-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pillar-box{background:var(--sur);border:1px solid var(--bor);border-radius:8px;padding:10px}
.pillar-label{font-size:9px;font-weight:700;color:var(--mu);text-transform:uppercase;margin-bottom:4px}

/* 30 DAY PLAN */
.day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.day-card{background:var(--sur);border:1px solid var(--bor);border-radius:8px;padding:10px}
.day-num{font-size:10px;font-weight:700;color:var(--a1);margin-bottom:6px}

/* TASK TRACKER */
.task-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(42,56,48,.08)}
.task-check{width:16px;height:16px;border-radius:4px;border:2px solid var(--bor);cursor:pointer;flex-shrink:0;background:none;appearance:none;-webkit-appearance:none;transition:all .15s;display:inline-block;vertical-align:middle;position:relative}
.task-check:checked{background:var(--a3);border-color:var(--a3)}
.task-check:checked::after{content:'';position:absolute;left:4px;top:1px;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg)}
.checklist-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid rgba(42,56,48,.07)}
.checklist-item:last-child{border-bottom:none}
.checklist-label{font-size:12px;flex:1;cursor:pointer;padding-top:1px;line-height:1.4}
.checklist-label.done{text-decoration:line-through;color:var(--mu)}
.priority-badge{padding:1px 7px;border-radius:99px;font-size:9px;font-weight:700}

/* FINANCE HUB */
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(42,56,48,.08);font-size:12px}
.fin-amount{font-weight:700;font-family:'Cormorant Garamond',serif;font-size:16px}

/* ANALYTICS */
.platform-row{display:grid;grid-template-columns:120px 1fr 1fr 80px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(42,56,48,.08);font-size:11px}

@media(max-width:820px){.g2,.g3{grid-template-columns:1fr}.main{padding:12px}.sb{width:190px}.main{margin-left:190px}}
</style>
</head>
<body>
<div class="shell">
  <div class="sb">
    <div class="logo">
      <h1>Creator OS</h1>
      <p id="logo-sub">Your Content Empire</p>
      <div class="autosave">💾 Auto-saves to your device</div>
    </div>


    <!-- POMODORO TIMER -->
    <div class="pomo">
      <div class="pomo-hdr"><span>⏱️ Pomodoro</span><span id="pomo-dots">🍅</span></div>
      <div class="pomo-bar"><div class="pomo-fill" id="pomo-bar" style="width:100%"></div></div>
      <div class="pomo-time" id="pomo-time">25:00</div>
      <div class="pomo-phase" id="pomo-phase">Work Session 💪</div>
      <div class="pomo-rounds-txt" id="pomo-rounds">Round 1 of 4</div>
      <div class="pomo-btns">
        <button class="pomo-btn pomo-go" id="pomo-play" onclick="pomoToggle()">&#9654; Start</button>
        <button class="pomo-btn pomo-sec" onclick="pomoSkip()">&#9197; Skip</button>
        <button class="pomo-btn pomo-sec" onclick="pomoReset()">&#8635; Reset</button>
      </div>
      <div class="pomo-cust" onclick="document.getElementById('pomo-panel').classList.toggle('open')">&#9881;&#65039; Customize Timer</div>
      <div class="pomo-settings" id="pomo-panel">
        <div class="pomo-row">
          <div><span class="pomo-lbl">Work (min)</span><input class="pomo-inp" type="number" id="pw" value="25" min="1" max="90" onchange="pomoUpdate()"/></div>
          <div><span class="pomo-lbl">Short Break</span><input class="pomo-inp" type="number" id="psb" value="5" min="1" max="30" onchange="pomoUpdate()"/></div>
        </div>
        <div class="pomo-row">
          <div><span class="pomo-lbl">Long Break</span><input class="pomo-inp" type="number" id="plb" value="15" min="1" max="60" onchange="pomoUpdate()"/></div>
          <div><span class="pomo-lbl">Rounds</span><input class="pomo-inp" type="number" id="prd" value="4" min="1" max="8" onchange="pomoUpdate()"/></div>
        </div>
      </div>
    </div>

    <!-- ACCOUNT SWITCHER -->
    <div class="acc-switch">
      <div class="acc-label">Active Account</div>
      <div class="acc-current" onclick="toggleAccDropdown()">
        <span class="acc-emoji" id="acc-emoji">📱</span>
        <span class="acc-name" id="acc-name">My Account</span>
        <span class="acc-arrow">▼</span>
      </div>
      <div class="acc-dropdown" id="acc-dropdown">
        <div style="height:1px;background:var(--bor);margin:4px 0"></div>
        <button class="acc-option acc-add" onclick="addNewAccount()">➕ Add New Account</button>
      </div>
    </div>

    <nav class="snav" id="sidebar-nav"></nav>
    <div class="sb-footer">Creator OS v4.0 · Pomodoro + AI</div>
  </div>

  <main class="main" id="main-content"></main>
</div>

<div class="ov" id="modal-bg">
  <div class="md" id="modal-box">
    <div class="mh">
      <h3 id="modal-title"></h3>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ─── STORAGE ──────────────────────────────────────────────────────────────────
function load(key,def){try{const v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch{return def;}}
function save(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}

// ─── ACCOUNTS ────────────────────────────────────────────────────────────────
const ACCOUNT_DEFAULTS = [
  {
    id:'acc_default', name:'My Account', handle:'@myhandle', emoji:'📱',
    niche:'',
    voice:'',
    audience:'',
    mission:'',
    colors:['#e8836a','#7ab88a','#f0b87a','#a8d4b0','#c4614a','#0f1210'],
    hashtags:'',
    posting:'',
    pillars:[
      {name:'Education',desc:'Tips, tutorials, value',color:'#7ab88a',emoji:'💡'},
      {name:'Entertainment',desc:'Fun, trending, viral content',color:'#e8836a',emoji:'🎭'},
      {name:'Behind the Scenes',desc:'Process, day in the life',color:'#a8d4b0',emoji:'🎬'},
      {name:'Monetization',desc:'Products, CTAs, offers',color:'#f0b87a',emoji:'💰'},
      {name:'Community',desc:'Q&A, engagement, trends',color:'#c4614a',emoji:'🤝'},
    ],
    agentSys:'You are an AI Content Agent helping a social media creator grow their brand. Help create content, write captions, hooks, and grow this brand. Match the creator\'s voice and niche.',
  },
];

let ACCOUNTS = load('cos_accounts', ACCOUNT_DEFAULTS);
let ACTIVE_ACC = load('cos_active_acc', 0);

function getAcc(){return ACCOUNTS[ACTIVE_ACC]||ACCOUNTS[0];}
function accKey(k){return `cos_${getAcc().id}_${k}`;}

function switchAccount(idx){
  ACTIVE_ACC=idx;save('cos_active_acc',idx);
  const acc=getAcc();
  document.getElementById('acc-emoji').textContent=acc.emoji;
  document.getElementById('acc-name').textContent=acc.name;
  document.getElementById('acc-dropdown').classList.remove('open');
  renderNav();renderPage();
}
function toggleAccDropdown(){document.getElementById('acc-dropdown').classList.toggle('open');}
function addNewAccount(){
  const name=prompt('Account name?');if(!name)return;
  const emoji=prompt('Emoji for this account?','📱')||'📱';
  const handle=prompt('Handle? (e.g. @myaccount)','')||'';
  const newAcc={
    id:'acc_'+Date.now(),name,handle,emoji,
    niche:'',voice:'',audience:'',mission:'',
    colors:['#e8836a','#7ab88a','#f0b87a','#a8d4b0'],
    hashtags:'',posting:'',pillars:[],
    agentSys:`You are an AI Content Agent for "${name}" — a social media brand. Help create content, write captions, hooks, and grow this brand.`,
  };
  ACCOUNTS.push(newAcc);save('cos_accounts',ACCOUNTS);
  switchAccount(ACCOUNTS.length-1);
  // update dropdown
  const dd=document.getElementById('acc-dropdown');
  const addBtn=dd.querySelector('.acc-add').parentElement;
  const btn=document.createElement('button');
  btn.className='acc-option';btn.textContent=`${emoji} ${name}`;
  const idx=ACCOUNTS.length-1;btn.onclick=()=>switchAccount(idx);
  dd.insertBefore(btn,addBtn);
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
const NAV=[
  {s:'Overview',items:[{id:'dashboard',ic:'✦',l:'Dashboard'},{id:'brandid',ic:'🎨',l:'Brand Identity'},{id:'goals',ic:'🎯',l:'Goals'}]},
  {s:'Content',items:[{id:'planner',ic:'📝',l:'Content Planner'},{id:'thirtyDay',ic:'📅',l:'30-Day Content Plan'},{id:'calendar',ic:'🗓️',l:'Calendar'},{id:'scripts',ic:'🎬',l:'Script Library'},{id:'hashtags',ic:'#️⃣',l:'Hashtag Vault'}]},
  {s:'Tracking',items:[{id:'tasks',ic:'✅',l:'Task Tracker'},{id:'analytics',ic:'📊',l:'Content Analytics'},{id:'platform',ic:'📈',l:'Platform Analytics'}]},

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function uid(){return Date.now()+Math.random().toString(36).slice(2);}
function pct(c,t){return Math.min(100,Math.round((c/t)*100));}
function fmt(n){if(!n&&n!==0)return'—';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return String(n);}
function fd(n){if(!n&&n!==0)return'—';return'$'+Number(n).toLocaleString();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function sc(s){return{Idea:'#7a9080',Scripting:'#e8836a',Filming:'#c4614a',Editing:'#f0b87a',Scheduled:'#7ab88a',Published:'#a8d4b0',Repurposed:'#d4c4a8'}[s]||'#888';}
function loadA(k,def){return load(accKey(k),def);}
function saveA(k,val){save(accKey(k),val);}

function saveGoal(id){
  const goals=loadA('goals',DEF_GOALS);
  const g={id:id||uid(),label:document.getElementById('g-label').value,current:Number(document.getElementById('g-current').value),target:Number(document.getElementById('g-target').value),unit:document.getElementById('g-unit').value,emoji:document.getElementById('g-emoji').value,platform:document.getElementById('g-platform').value,deadline:document.getElementById('g-deadline').value};

}

// ─── CALENDAR ────────────────────────────────────────────────────────────────
function renderCalendar(){
  const posts=loadA('posts',DEF_POSTS);
  const acc=getAcc();
  const now=new Date();
  const mo=STATE.calMo!==undefined?STATE.calMo:now.getMonth();
  const yr=STATE.calYr||now.getFullYear();
  const MNS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DNS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const fd2=new Date(yr,mo,1).getDay();
  const dim=new Date(yr,mo+1,0).getDate();
  const cells=Array(fd2).fill(null).concat(Array.from({length:dim},(_,i)=>i+1));
  while(cells.length%7!==0)cells.push(null);
  return`
    <div class="ph"><h2>Content Calendar</h2><p>Your posting schedule at a glance.</p></div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <button class="btn btn-ghost btn-sm" onclick="calNav(-1)">← Prev</button>
      <span style="font-size:16px;font-weight:700;font-family:'Cormorant Garamond',serif">${MNS[mo]} ${yr}</span>
      <button class="btn btn-ghost btn-sm" onclick="calNav(1)">Next →</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px">${DNS.map(d=>`<div style="text-align:center;font-size:9px;font-weight:700;color:var(--mu);padding:3px">${d}</div>`).join('')}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">
      ${cells.map(d=>{
        if(!d)return'<div style="min-height:66px;border-radius:6px"></div>';
        const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dps=posts.filter(p=>p.date===ds);
        const isT=d===now.getDate()&&mo===now.getMonth()&&yr===now.getFullYear();
        return`<div style="min-height:66px;background:var(--sur);border:1px solid ${isT?'var(--a1)':'var(--bor)'};border-radius:6px;padding:4px">
          <div style="font-size:9px;font-weight:700;color:${isT?'var(--a1)':'var(--mu)'};margin-bottom:2px">${d}</div>
          ${dps.map(p=>{const pl=acc.pillars[p.pillar];return`<div style="font-size:8px;padding:1px 3px;border-radius:3px;margin-bottom:1px;background:${(pl?.color||'#e8836a')}20;color:${pl?.color||'#e8836a'};overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${pl?.emoji||''} ${esc(p.title||'Post')}</div>`;}).join('')}
        </div>`;
      }).join('')}
    </div>
  `;
}
function calNav(dir){let mo=STATE.calMo!==undefined?STATE.calMo:new Date().getMonth();let yr=STATE.calYr||new Date().getFullYear();mo+=dir;if(mo<0){mo=11;yr--;}if(mo>11){mo=0;yr++;}STATE.calMo=mo;STATE.calYr=yr;renderPage();}

function initAgent(){const msgs=document.getElementById('chat-msgs');if(msgs)msgs.scrollTop=msgs.scrollHeight;}

async function sendChat(text){
  const apiKey=getClaudeKey();
  if(!apiKey){renderPage();return;}
  const inp=document.getElementById('chat-input');
  const msg=text||(inp?inp.value.trim():'');
  if(!msg)return;
  if(inp)inp.value='';
  const chat=loadA('chat',[]);
  chat.push({role:'user',content:msg});saveA('chat',chat);
  const msgs=document.getElementById('chat-msgs');
  if(msgs){msgs.innerHTML+=`<div class="chat-msg user">${esc(msg)}</div><div class="chat-msg ai" id="loading-msg"><div class="ai-label">✦ Claude AI</div><em style="color:var(--mu)">Writing your content...</em></div>`;msgs.scrollTop=msgs.scrollHeight;}
  const btn=document.getElementById('chat-send-btn');if(btn)btn.disabled=true;
  try{
    const history=chat.slice(-12).map(m=>({role:m.role==='ai'?'assistant':'user',content:m.content}));
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,system:getClaudeSys(),messages:history})
    });
    const data=await res.json();
    if(data.error){throw new Error(data.error.message||'API error');}
    const reply=(data.content&&data.content[0]&&data.content[0].text)||'Sorry, something went wrong. Try again!';
    chat.push({role:'ai',content:reply});saveA('chat',chat);
    const loading=document.getElementById('loading-msg');
    if(loading)loading.outerHTML=`<div class="chat-msg ai"><div class="ai-label">✦ Claude AI</div>${esc(reply)}</div>`;
  }catch(e){
    const loading=document.getElementById('loading-msg');
    if(loading)loading.outerHTML=`<div class="chat-msg ai"><div class="ai-label">✦ Claude AI</div>⚠️ ${esc(e.message||'Network error — check your API key and try again.')}.</div>`;
    console.error('Claude error:',e);
  }
  if(btn)btn.disabled=false;
  const msgsEl=document.getElementById('chat-msgs');if(msgsEl)msgsEl.scrollTop=msgsEl.scrollHeight;
}

      ACCOUNTS[0].handle=handle;
      save('cos_accounts',ACCOUNTS);
      save('cos_onboarded',true);
      document.getElementById('acc-emoji').textContent=emoji;
      document.getElementById('acc-name').textContent=name;
      const logoSub=document.getElementById('logo-sub');
      if(logoSub)logoSub.textContent=name+' · Creator OS';
      // rebuild dropdown
      const dd=document.getElementById('acc-dropdown');dd.innerHTML='';
      ACCOUNTS.forEach((a,i)=>{const btn=document.createElement('button');btn.className='acc-option'+(i===ACTIVE_ACC?' active':'');btn.textContent=`${a.emoji} ${a.name}`;btn.onclick=()=>switchAccount(i);dd.appendChild(btn);});
      const dv=document.createElement('div');dv.style='height:1px;background:var(--bor);margin:4px 0';dd.appendChild(dv);
      const ab=document.createElement('button');ab.className='acc-option acc-add';ab.textContent='➕ Add New Account';ab.onclick=addNewAccount;dd.appendChild(ab);
      renderPage();
    }else{save('cos_onboarded',true);}
  },400);
}


// ─── POMODORO ─────────────────────────────────────────────────────────────────
var POMO = {w:25,sb:5,lb:15,rd:4,phase:'work',round:1,run:false,tmr:null,sec:1500,tot:1500};
function pomoUpdate(){POMO.w=Number(document.getElementById('pw')||{value:25}).value||25;POMO.sb=Number((document.getElementById('psb')||{value:5}).value)||5;POMO.lb=Number((document.getElementById('plb')||{value:15}).value)||15;POMO.rd=Number((document.getElementById('prd')||{value:4}).value)||4;if(!POMO.run)pomoReset();}
function pomoToggle(){if(POMO.run){clearInterval(POMO.tmr);POMO.run=false;var b=document.getElementById('pomo-play');if(b)b.textContent='▶ Start';}else{POMO.run=true;var b=document.getElementById('pomo-play');if(b)b.textContent='⏸ Pause';POMO.tmr=setInterval(pomoTick,1000);}}
function pomoTick(){POMO.sec--;if(POMO.sec<=0){pomoAlert();pomoNext();}pomoDisplay();}
function pomoNext(){if(POMO.phase==='work'){if(POMO.round>=POMO.rd){POMO.phase='long';POMO.sec=POMO.lb*60;POMO.tot=POMO.lb*60;}else{POMO.phase='short';POMO.sec=POMO.sb*60;POMO.tot=POMO.sb*60;}}else if(POMO.phase==='short'){POMO.round++;POMO.phase='work';POMO.sec=POMO.w*60;POMO.tot=POMO.w*60;}else{POMO.round=1;POMO.phase='work';POMO.sec=POMO.w*60;POMO.tot=POMO.w*60;}}
function pomoSkip(){clearInterval(POMO.tmr);POMO.run=false;var b=document.getElementById('pomo-play');if(b)b.textContent='▶ Start';pomoNext();pomoDisplay();}
function pomoReset(){clearInterval(POMO.tmr);POMO.run=false;POMO.phase='work';POMO.round=1;POMO.sec=POMO.w*60;POMO.tot=POMO.w*60;var b=document.getElementById('pomo-play');if(b)b.textContent='▶ Start';pomoDisplay();}
function pomoAlert(){try{var c=new(window.AudioContext||window.webkitAudioContext)();var o=c.createOscillator();var g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.value=0.3;o.start();setTimeout(function(){o.stop();c.close();},500);}catch(e){}}
function pomoDisplay(){var m=Math.floor(POMO.sec/60),s=POMO.sec%60;var te=document.getElementById('pomo-time');var pe=document.getElementById('pomo-phase');var re=document.getElementById('pomo-rounds');var be=document.getElementById('pomo-bar');var de=document.getElementById('pomo-dots');if(te)te.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;if(pe)pe.textContent=POMO.phase==='work'?'Work Session 💪':POMO.phase==='short'?'Short Break ☕':'Long Break 🌿';if(re)re.textContent='Round '+POMO.round+' of '+POMO.rd;if(be)be.style.width=((POMO.sec/POMO.tot)*100)+'%';if(de){var d='';for(var i=0;i<POMO.rd;i++)d+=i<POMO.round?'🍅':'⬜';de.textContent=d;}if(te)te.style.color=POMO.phase==='work'?'var(--a1)':POMO.phase==='short'?'var(--a3)':'var(--a5)';}
pomoDisplay();
if(Notification&&Notification.permission==='default')Notification.requestPermission();

// ─── IMAGE UPLOAD HELPER ──────────────────────────────────────────────────────
function imgUploadBtn(storageKey,label){
  const existing=load(accKey(storageKey),'');
  const pdfKey=storageKey+'_pdf';
  const existingPdf=load(accKey(pdfKey),'');
  const existingPdfName=load(accKey(pdfKey+'_name'),'');
  return`<div style="margin-top:8px">
    <div style="font-size:9px;font-weight:600;color:var(--mu);text-transform:uppercase;margin-bottom:6px">${label||'Files'}</div>
    ${existing?`<div style="position:relative;margin-bottom:5px"><img src="${existing}" style="width:100%;max-height:180px;object-fit:cover;border-radius:7px;border:1px solid var(--bor)"/><button onclick="removeImg('${storageKey}')" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button></div>`:''}
    ${existingPdf?`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--sur);border:1px solid var(--bor);border-radius:7px;margin-bottom:5px">
      <span style="font-size:18px">📄</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(existingPdfName||'Document.pdf')}</div>
        <div style="font-size:9px;color:var(--mu)">PDF attached</div>
      </div>
      <div style="display:flex;gap:4px">
        <a href="${existingPdf}" download="${esc(existingPdfName||'document.pdf')}" style="display:inline-flex;align-items:center;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;background:rgba(122,184,138,.15);color:var(--a3);border:1px solid rgba(122,184,138,.3);text-decoration:none">⬇ View</a>
        <button onclick="removePdf('${pdfKey}')" style="padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;background:rgba(224,112,96,.1);color:var(--dn);border:1px solid rgba(224,112,96,.2);cursor:pointer">✕</button>
      </div>
    </div>`:''}
    <div style="display:flex;gap:6px">
      <label style="flex:1;display:flex;align-items:center;gap:6px;padding:7px 11px;background:var(--sur);border:1px dashed var(--bor);border-radius:7px;cursor:pointer;font-size:11px;color:var(--mu);transition:all .15s" onmouseover="this.style.borderColor='var(--a1)';this.style.color='var(--a1)'" onmouseout="this.style.borderColor='var(--bor)';this.style.color='var(--mu)'">
        🖼️ ${existing?'Replace':'Upload'} Image
        <input type="file" accept="image/*" style="display:none" onchange="handleImgUpload(event,'${storageKey}')"/>
      </label>
      <label style="flex:1;display:flex;align-items:center;gap:6px;padding:7px 11px;background:var(--sur);border:1px dashed var(--bor);border-radius:7px;cursor:pointer;font-size:11px;color:var(--mu);transition:all .15s" onmouseover="this.style.borderColor='var(--a3)';this.style.color='var(--a3)'" onmouseout="this.style.borderColor='var(--bor)';this.style.color='var(--mu)'">
        📄 ${existingPdf?'Replace':'Upload'} PDF
        <input type="file" accept="application/pdf" style="display:none" onchange="handlePdfUpload(event,'${pdfKey}')"/>
      </label>
    </div>
  </div>`;
}
function handleImgUpload(e,key){
  const file=e.target.files[0];if(!file)return;
  if(file.size>5*1024*1024){alert('Image too large! Please use an image under 5MB.');return;}
  const reader=new FileReader();
  reader.onload=ev=>{save(accKey(key),ev.target.result);renderPage();};
  reader.readAsDataURL(file);
}
function handlePdfUpload(e,key){
  const file=e.target.files[0];if(!file)return;
  if(file.size>10*1024*1024){alert('PDF too large! Please use a PDF under 10MB.');return;}
  const reader=new FileReader();
  reader.onload=ev=>{
    save(accKey(key),ev.target.result);
    save(accKey(key+'_name'),file.name);
    renderPage();
  };
  reader.readAsDataURL(file);
}
function removeImg(key){save(accKey(key),'');renderPage();}
function removePdf(key){save(accKey(key),'');save(accKey(key+'_name'),'');renderPage();}

</script>
</body>
